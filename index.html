<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiles Dungeon Prototype</title>
    <link rel="stylesheet" href="/src/styles.css">
  </head>
  <body>
    <div id="game"></div>
    <div class="hud">
      <header class="topbar">
        <div class="brand">
          <h1 class="title">Tiles Dungeon</h1>
          <span id="seed" class="seed">种子</span>
        </div>
        <div class="stats">
          <span id="position" class="stat">位置</span>
          <span id="moves" class="stat">回合</span>
          <span id="defeated" class="stat">击败</span>
          <span id="gold" class="stat">金币</span>
          <button id="new-dungeon" type="button">新地牢</button>
        </div>
      </header>
      <p class="hint">WASD / 方向键移动 · 宝箱自动开启 · 撞击哥布林攻击</p>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
